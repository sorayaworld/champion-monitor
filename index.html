<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LKS Live Competition Dashboard</title>

<style>

body{
font-family:Arial;
background:#fafafa;
}

h2{
text-align:center;
}

table{
border-collapse:collapse;
width:100%;
}

td,th{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#eee;
}

.active{color:green;font-weight:bold;}
.warn{color:orange;font-weight:bold;}
.idle{color:red;font-weight:bold;}

</style>
</head>
<body>

<h2 id="leader">🏁 LKS LIVE COMPETITION DASHBOARD</h2>

<table id="board">

<tr>
<th>Rank</th>
<th>Repo</th>
<th>Score</th>
<th>Activity</th>
<th>Idle Status</th>
<th>Last Commit</th>
<th>Commits</th>
<th>Workflow</th>
<th>Events</th>
</tr>

</table>


<script>


/*
SET START TIME LOMBA DI SINI
FORMAT: YYYY-MM-DDTHH:mm:ss
WIB = UTC+7
*/

const COMPETITION_START =
new Date("2026-04-01T09:10:00+07:00");


const repos=[

{ name:"Champion UMKM", repo:"sorayaworld/champion-umkm" },
{ name:"Champion Desktop", repo:"sorayaworld/champion-desktop" },
{ name:"Champion Mobile", repo:"sorayaworld/champion-mobile-umkm" },
{ name:"Champion Laravel", repo:"sorayaworld/champion-laravel" }

];



function activityStatus(date){

let seconds=Math.floor((new Date()-date)/1000);

if(seconds<300) return "🔥 Active Now";
if(seconds<1800) return "🟢 Active";
return "🟡 Slow";

}


function idleStatus(date){

let seconds=Math.floor((new Date()-date)/1000);

if(seconds>1800) return "🚨 Idle >30m";
return "OK";

}



async function loadDashboard(){

let rows=[];

for(let repo of repos){

try{

let commit=await fetch(
`https://api.github.com/repos/${repo.repo}/commits/main`
).then(r=>r.json());


let commitTime=new Date(commit.commit.author.date);


if(commitTime<COMPETITION_START){

rows.push({

name:repo.name,
score:0,
activity:"Waiting Start",
idle:"-",
commit:"-",
count:0,
workflow:"-"

});

continue;

}


let score=0;

try{

let scoreData=await fetch(
`https://raw.githubusercontent.com/${repo.repo}/main/public/score.json`
).then(r=>r.json());

score=parseInt(scoreData.score);

}catch{}


let events=await fetch(
`https://api.github.com/repos/${repo.repo}/events`
).then(r=>r.json());


let filteredEvents=
events.filter(e =>
new Date(e.created_at)>COMPETITION_START
);


let workflowRuns=await fetch(
`https://api.github.com/repos/${repo.repo}/actions/runs?per_page=1`
).then(r=>r.json());


let workflowStatus=
workflowRuns.workflow_runs[0]?.conclusion ?? "running";


let workflowIcon="⏳";

if(workflowStatus==="success") workflowIcon="✅";
if(workflowStatus==="failure") workflowIcon="❌";


rows.push({

name:repo.name,
score:score,
activity:activityStatus(commitTime),
idle:idleStatus(commitTime),
commit:commit.commit.message,
count:filteredEvents.length,
workflow:workflowIcon

});

}catch(err){

console.log(repo.name,"error");

}

}


rows.sort((a,b)=>b.score-a.score);


render(rows);

}



function render(rows){

let table=document.getElementById("board");

rows.forEach((r,i)=>{

let html=`

<tr>

<td>${i+1}</td>

<td>${r.name}</td>

<td><b>${r.score}/100</b></td>

<td>${r.activity}</td>

<td>${r.idle}</td>

<td>${r.commit}</td>

<td>${r.count}</td>

<td>${r.workflow}</td>

<td>Tracked</td>

</tr>

`;

table.innerHTML+=html;

});


if(rows.length>0){

document.getElementById("leader").innerText=

"🏆 Leading: "+rows[0].name+" ("+rows[0].score+")";

}

}



loadDashboard();



/*
AUTO REFRESH (AMAN DARI RATE LIMIT)
*/

setInterval(loadDashboard,15000);


</script>

</body>
</html>
