<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LKS LIVE COMPETITION DASHBOARD</title>

<style>

body{
font-family:Arial;
background:#fafafa;
}

h2{
text-align:center;
margin-bottom:5px;
}

#countdown{
text-align:center;
margin-bottom:15px;
font-weight:bold;
color:#555;
}

table{
border-collapse:collapse;
width:100%;
}

td,th{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#eee;
}

.empty{
text-align:center;
padding:20px;
color:#666;
font-style:italic;
}

</style>
</head>
<body>

<h2 id="leader">🏁 LKS LIVE COMPETITION DASHBOARD</h2>
<p id="countdown"></p>

<table id="board"></table>

<script>

const COMPETITION_START =
new Date("2026-04-01T09:10:00+07:00");


const repos=[

{ name:"Champion UMKM", repo:"sorayaworld/champion-umkm" },
{ name:"Champion Desktop", repo:"sorayaworld/champion-desktop" },
{ name:"Champion Mobile", repo:"sorayaworld/champion-mobile-umkm" },
{ name:"Champion Laravel", repo:"sorayaworld/champion-laravel" }

];



function activityStatus(score){

if(score>=80) return "🔥 Active";
if(score>0) return "🟢 Progress";
return "⏳ Waiting";

}


function idleStatus(score){

if(score===0) return "🚨 Idle";
return "OK";

}



function updateCountdown(){

let now=new Date();

let diff=COMPETITION_START-now;

if(diff<=0){

document.getElementById("countdown").innerText =
"Competition is running...";

return;

}

let minutes=Math.floor(diff/60000);

document.getElementById("countdown").innerText =
"Competition starts in "+minutes+" minutes";

}



async function loadDashboard(){

const table=document.getElementById("board");


table.innerHTML=`

<tr>
<th>Rank</th>
<th>Repo</th>
<th>Score</th>
<th>Activity</th>
<th>Idle</th>
<th>Status</th>
<th>Source</th>
</tr>
`;


if(new Date()<COMPETITION_START){

document.getElementById("leader").innerText =
"⏳ Competition has not started yet";

table.innerHTML+=`
<tr>
<td colspan="7" class="empty">
Waiting for competition start time (09:10 WIB)
</td>
</tr>
`;

return;

}


let rows=[];


for(let repo of repos){

let score=0;

try{

let scoreData=await fetch(
`https://raw.githubusercontent.com/${repo.repo}/main/public/score.json?cache=${Date.now()}`
).then(r=>r.json());

score=parseInt(scoreData.score)||0;

}catch(e){

console.log(repo.name,"score fetch error");

}


rows.push({

name:repo.name,
score:score,
activity:activityStatus(score),
idle:idleStatus(score)

});

}



rows.sort((a,b)=>b.score-a.score);


rows.forEach((r,i)=>{

table.innerHTML+=`

<tr>

<td>${i+1}</td>
<td>${r.name}</td>
<td><b>${r.score}/100</b></td>
<td>${r.activity}</td>
<td>${r.idle}</td>
<td>Tracked</td>
<td>score.json</td>

</tr>

`;

});


if(rows.length>0){

document.getElementById("leader").innerText=
"🏆 Leading: "+rows[0].name+" ("+rows[0].score+")";

}

}



updateCountdown();

setInterval(updateCountdown,1000);

loadDashboard();

setInterval(loadDashboard,30000);

</script>

</body>
</html>
