<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LKS Activity Monitor PRO</title>

<style>

body{
font-family:Arial;
background:#fafafa;
padding:20px;
}

h2{
text-align:center;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:8px;
font-size:14px;
text-align:center;
}

th{
background:#eee;
}

.progress{
height:10px;
background:#ddd;
border-radius:4px;
overflow:hidden;
}

.bar{
height:100%;
}

.active{
color:green;
font-weight:bold;
}

.idle30{
color:orange;
font-weight:bold;
}

.idle60{
color:red;
font-weight:bold;
}

.leader{
background:#e8fff1;
font-weight:bold;
}

.timeline{
font-size:11px;
color:#666;
}

</style>
</head>
<body>

<h2>🏁 LKS LIVE COMPETITION DASHBOARD</h2>

<div id="leader"></div>

<table id="board">

<tr>
<th>Rank</th>
<th>Repo</th>
<th>Score</th>
<th>Activity</th>
<th>Idle Status</th>
<th>Last Commit</th>
<th>Commits</th>
<th>Workflow</th>
<th>Events</th>
</tr>

</table>

<script>

const repos=[

{ name:"Champion UMKM", repo:"sorayaworld/champion-umkm" },
{ name:"Champion Desktop", repo:"sorayaworld/champion-dekstop" },
{ name:"Champion Mobile", repo:"sorayaworld/champion-mobile-umkm" },
{ name:"Champion Laravel", repo:"sorayaworld/champion-laravel" }

];


function timeAgo(date){

let seconds=Math.floor((new Date()-new Date(date))/1000);

if(seconds<300) return "🔥 ACTIVE";
if(seconds<1800) return "🟢 5-30m";
if(seconds<3600) return "🟠 30-60m";
return "🔴 >60m";

}


function idleClass(date){

let seconds=Math.floor((new Date()-new Date(date))/1000);

if(seconds<300) return "active";
if(seconds<1800) return "";
if(seconds<3600) return "idle30";
return "idle60";

}


function scoreColor(score){

if(score>=80) return "#27ae60";
if(score>=50) return "#f39c12";
return "#e74c3c";

}


function progressBar(score){

return `
<div class="progress">
<div class="bar" style="
width:${score}%;
background:${scoreColor(score)};
"></div>
</div>
`;

}


async function loadRepo(repo){

try{

let commit=await fetch(
`https://api.github.com/repos/${repo.repo}/commits/main`
).then(r=>r.json());

let commitTime=commit.commit.author.date;

let totalCommits=await fetch(
`https://api.github.com/repos/${repo.repo}/commits?per_page=1`
);

let commitCount=totalCommits.headers.get("link")?.match(/page=(\d+)>; rel="last"/)?.[1]||1;


let score=0;

try{

let scoreData=await fetch(
`https://raw.githubusercontent.com/${repo.repo}/main/public/score.json`
).then(r=>r.json());

score=scoreData.score;

}catch{}


let workflow=await fetch(
`https://api.github.com/repos/${repo.repo}/actions/runs?per_page=1`
).then(r=>r.json());

let wf=workflow.workflow_runs[0]?.conclusion||"unknown";

let wfIcon="⏳";

if(wf=="success") wfIcon="✅";
if(wf=="failure") wfIcon="❌";


let events=await fetch(
`https://api.github.com/repos/${repo.repo}/events`
).then(r=>r.json());


let timeline=events
.slice(0,3)
.map(e=>e.type)
.join(" → ");


return{

name:repo.name,
score:score,
commitTime:commitTime,
commitMsg:commit.commit.message,
commits:commitCount,
workflow:wfIcon,
timeline:timeline

};

}catch(e){

console.log(e);

}

}



async function buildDashboard(){

let results=await Promise.all(repos.map(loadRepo));

results.sort((a,b)=>b.score-a.score);


document.getElementById("board").innerHTML=`

<tr>
<th>Rank</th>
<th>Repo</th>
<th>Score</th>
<th>Activity</th>
<th>Idle Status</th>
<th>Last Commit</th>
<th>Commits</th>
<th>Workflow</th>
<th>Events</th>
</tr>

`;


results.forEach((r,i)=>{

let idle=timeAgo(r.commitTime);

let row=`

<tr class="${i==0?'leader':''}">

<td>#${i+1}</td>

<td>${r.name}</td>

<td>

${r.score}/100

${progressBar(r.score)}

</td>

<td>${idle}</td>

<td class="${idleClass(r.commitTime)}">

${new Date(r.commitTime).toLocaleTimeString()}

</td>

<td>${r.commitMsg}</td>

<td>${r.commits}</td>

<td>${r.workflow}</td>

<td class="timeline">${r.timeline}</td>

</tr>

`;

document.getElementById("board").innerHTML+=row;

});


document.getElementById("leader").innerHTML=

"👑 Leader sementara: <b>"+results[0].name+"</b>";

}



buildDashboard();

setInterval(buildDashboard,30000);

</script>

</body>
</html>
